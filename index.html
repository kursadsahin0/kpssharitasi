<!doctype html>
<html>
  <head>
    <title><%= productName %></title>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3498040280017092"
      crossorigin="anonymous"
    ></script>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="author" content="KPSS Haritası" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width"
    />

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231A1025'/%3E%3Cpath d='M32 14L13 23L32 32L51 23Z' fill='%239B7FD4'/%3E%3Cpath d='M32 32L13 23L13 32L32 41Z' fill='%237B5FB8'/%3E%3Cpath d='M32 32L51 23L51 32L32 41Z' fill='%23B89EE8'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="kpss-splash" style="
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1A1025;
      transition: opacity 0.4s ease;
    ">
      <svg width="120" height="120" viewBox="0 0 288 288" fill="none">
        <path d="M144 80L60 120L144 160L228 120Z" fill="#9B7FD4"/>
        <path d="M144 160L60 120L60 160L144 200Z" fill="#7B5FB8"/>
        <path d="M144 160L228 120L228 160L144 200Z" fill="#B89EE8"/>
        <rect x="201" y="118" width="6" height="54" fill="#FFD54F"/>
        <circle cx="204" cy="172" r="8" fill="#FFD54F"/>
      </svg>
      <div style="
        margin-top: 24px;
        font-family: 'DM Sans', system-ui, sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 2px;
      ">KPSS</div>
      <div style="
        margin-top: 8px;
        font-family: 'DM Sans', system-ui, sans-serif;
        font-size: 14px;
        color: rgba(245,243,248,0.6);
      ">Yükleniyor...</div>
    </div>
    <!-- quasar:entry-point -->
    <script>
      ;(function(){
        var minDisplay = 2000;
        var maxDisplay = 7000;
        var start = Date.now();
        var removed = false;

        function removeSplash() {
          if (removed) return;
          removed = true;
          var splash = document.getElementById('kpss-splash');
          if (!splash) return;
          splash.style.opacity = '0';
          setTimeout(function(){ splash.remove(); }, 400);
        }

        var check = setInterval(function(){
          if (document.querySelector('#q-app > *')) {
            clearInterval(check);
            var elapsed = Date.now() - start;
            var remaining = Math.max(0, minDisplay - elapsed);
            setTimeout(function(){
              removeSplash();
            }, remaining);
          }
        }, 50);

        // Failsafe: if app mount fails, do not keep user blocked forever.
        setTimeout(function(){
          clearInterval(check);
          removeSplash();
        }, maxDisplay);
      })();
    </script>
  </body>
</html>
